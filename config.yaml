# AI Ensemble Platform Configuration
# Enable/disable providers and configure which models to use

providers:
  anthropic:
    enabled: true
    models:
      - id: claude-sonnet-4-6
        name: "Claude Sonnet 4.6"
        role: reasoning
      - id: claude-haiku-4-5-20251001
        name: "Claude Haiku 4.5"
        role: fast

  openai:
    enabled: true
    models:
      - id: gpt-4o
        name: "GPT-4o"
        role: reasoning
      - id: o3-mini
        name: "o3-mini"
        role: deep_reasoning

  google:
    enabled: true
    models:
      - id: gemini-2.5-pro
        name: "Gemini 2.5 Pro"
        role: reasoning
      - id: gemini-2.5-flash
        name: "Gemini 2.5 Flash"
        role: fast

  deepseek:
    enabled: false
    models:
      - id: deepseek-reasoner
        name: "DeepSeek R1"
        role: deep_reasoning

  ollama:
    enabled: false
    models:
      - id: llama3.1:70b
        name: "Llama 3.1 70B"
        role: reasoning
      - id: qwen2.5:32b
        name: "Qwen 2.5 32B"
        role: reasoning

# Synthesis configuration
synthesis:
  # Which provider/model acts as the final judge
  provider: anthropic
  model: claude-sonnet-4-6

  # Strategies: best_of_n, weighted_merge, debate, chain_of_verification
  strategy: weighted_merge

  # How many rounds of debate (for debate strategy)
  debate_rounds: 2

# Pipeline settings
pipeline:
  # Max concurrent model calls
  max_concurrency: 5
  # Timeout per model call (seconds)
  timeout: 120
  # Include reasoning traces in output
  show_reasoning: true

# Scoring weights (used in weighted_merge)
weights:
  accuracy: 0.35
  completeness: 0.25
  reasoning_quality: 0.20
  clarity: 0.10
  consensus: 0.10
